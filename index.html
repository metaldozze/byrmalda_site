    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        .light { background-color: #ffffff; color: #1e293b; }
        .glass-panel { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.7); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.8); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-overlay { background-color: rgba(0,0,0,0.5); z-index: 50; }
        .btn-primary { transition: all 0.2s ease; }
        .btn-primary:active { transform: scale(0.95); }
    </style>
</head>
<body class="light overflow-x-hidden">

    <div id="app" class="min-h-screen flex flex-col md:flex-row">
        
        <!-- Sidebar Navigation -->
        <nav id="sidebar" class="w-full md:w-20 lg:w-64 border-r border-slate-200 dark:border-slate-800 p-4 flex flex-col justify-between hidden md:flex h-screen sticky top-0 bg-white dark:bg-slate-900 z-40">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter mb-10 text-center lg:text-left">BYRMALDA</h1>
                <div class="space-y-2" id="nav-links">
                    <!-- Nav items dynamically generated -->
                </div>
            </div>
            <div id="user-nav-footer" class="space-y-2 border-t pt-4 border-slate-100 dark:border-slate-800">
                <!-- User profile summary or login btn -->
            </div>
        </nav>

        <!-- Mobile Header -->
        <header class="md:hidden border-b p-4 flex justify-between items-center bg-white dark:bg-slate-900 sticky top-0 z-40">
            <h1 class="text-xl font-bold">BYRMALDA</h1>
            <button id="mobile-menu-toggle" class="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 p-6 overflow-y-auto">
            <!-- Dynamic pages will load here -->
            <div id="page-loader" class="flex justify-center items-center h-full">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-900 dark:border-white"></div>
            </div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modal-container" class="fixed inset-0 modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-md p-6 shadow-2xl relative" id="modal-content">
            <!-- Dynamic modal content -->
        </div>
    </div>

    <!-- Notifications -->
    <div id="notification-center" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, onSnapshot, addDoc, getDocs, deleteDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGS
        const firebaseConfig = {
            apiKey: "AIzaSyD0YkXZgk8gh01Y7XH3ZRVU5lCjGJ_IRCw",

            messagingSenderId: "969880048160",
            appId: "1:969880048160:web:9001a95f7ea28e98912245",
            measurementId: "G-HCQEFD2SJF"
        };
        const IMGBB_API_KEY = "eeef3479094c5cf6bf42607927565065";
        const ADMIN_EMAIL = "sobakastalina123@gmail.com";
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'byrmalda-web';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // State Management
        let currentUser = null;
        let userProfile = null;
        let currentLang = localStorage.getItem('byrmalda_lang') || 'ru';
        let currentTheme = localStorage.getItem('byrmalda_theme') || 'light';
        let cart = JSON.parse(localStorage.getItem('byrmalda_cart')) || [];
        let messagesUnreadCount = 0;

        const translations = {
            ru: {
                home: "Главная", search: "Поиск", catalog: "Каталог", profile: "Профиль", cart: "Корзина", 
                support: "Поддержка", settings: "Настройки", feedback: "Отзывы", login: "Войти", logout: "Выйти",
                adminPanel: "Панель админа", suggestProduct: "Предложить товар", email: "Почта", password: "Пароль",
                noAccount: "Нет аккаунта? Зарегистрируйтесь", alreadyHaveAccount: "Уже есть аккаунт? Войти",
                register: "Регистрация", name: "Ваше имя", confirmPassword: "Повторите пароль",
                welcome: "Добро пожаловать!", accountNotFound: "Ошибка: аккаунт не найден",
                checkEmail: "Проверьте почту для подтверждения", next: "Далее", submit: "Отправить",
                size: "Размер", color: "Цвет", material: "Материал", price: "Цена", weight: "Масса",
                available: "В наличии", outOfStock: "Нет в наличии", buy: "Купить", preOrder: "Предзаказ",
                total: "Итого", delivery: "Доставка", checkout: "Оформить заказ",
                myOrders: "Мои заказы", orderId: "ID заказа", tracking: "Трек-номер", status: "Статус",
                regDate: "Дата регистрации", uploadAvatar: "Выберите новую аватарку",
                pendingModeration: "Аватарка скоро появится после модерации",
                blockedMsg: "Аккаунт заблокирован из за нарушений сайта, пожалуйста, напишите нам в тг @fueum",
                supportPrompt: "Для совершения оплаты обратитесь в поддержку или напишите нашему админу в тг @fueum",
                createProduct: "Создание товара", blockUsers: "Блокировка", moderFeedback: "Отзывы и репорты",
                moderAvatars: "Аватарки", orderStatuses: "Статус заказа", userProducts: "Товары от людей",
                edit: "Редактировать", approve: "Одобрить", reject: "Отклонить", delete: "Удалить",
                awaitingPayment: "Ожидает оплату", created: "Создан", delivering: "Передача в доставку", inTransit: "В пути",
                cancelOrder: "Отменить заказ", cannotCancel: "Заказ нельзя отменить на этом этапе",
                fromUser: "от пользователя"
            },
            en: {
                home: "Home", search: "Search", catalog: "Catalog", profile: "Profile", cart: "Cart",
                support: "Support", settings: "Settings", feedback: "Reviews", login: "Login", logout: "Logout",
                adminPanel: "Admin Panel", suggestProduct: "Suggest Product", email: "Email", password: "Password",
                noAccount: "No account? Register", alreadyHaveAccount: "Have an account? Login",
                register: "Register", name: "Your Name", confirmPassword: "Confirm Password",
                welcome: "Welcome!", accountNotFound: "Error: Account not found",
                checkEmail: "Check your email for confirmation", next: "Next", submit: "Submit",
                size: "Size", color: "Color", material: "Material", price: "Price", weight: "Weight",
                available: "In stock", outOfStock: "Out of stock", buy: "Buy", preOrder: "Pre-order",
                total: "Total", delivery: "Delivery", checkout: "Checkout",
                myOrders: "My Orders", orderId: "Order ID", tracking: "Track Number", status: "Status",
                regDate: "Reg Date", uploadAvatar: "Choose new avatar",
                pendingModeration: "Avatar will appear after moderation",
                blockedMsg: "Account blocked for site violations, please contact us on TG @fueum",
                supportPrompt: "To make payment contact support or write to our admin on TG @fueum",
                createProduct: "Create Product", blockUsers: "Blocking", moderFeedback: "Reviews & Reports",
                moderAvatars: "Avatars", orderStatuses: "Order Status", userProducts: "User Products",
                edit: "Edit", approve: "Approve", reject: "Reject", delete: "Delete",
                awaitingPayment: "Awaiting Payment", created: "Created", delivering: "In Handing", inTransit: "In Transit",
                cancelOrder: "Cancel Order", cannotCancel: "Cannot cancel order at this stage",
                fromUser: "from user"
            }
        };

        const t = (key) => translations[currentLang][key] || key;

        // --- STREAMING_CHUNK:Helper Functions... ---
        
        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                return data.data.url;
            } catch (err) {
                showNotify("Error uploading image", "error");
                return null;
            }
        }

        function showNotify(msg, type = "info") {
            const container = document.getElementById('notification-center');
            const div = document.createElement('div');
            div.className = `p-4 rounded-xl shadow-lg transform transition-all duration-300 translate-y-10 opacity-0 ${type === 'error' ? 'bg-red-500 text-white' : 'bg-white dark:bg-slate-700 dark:text-white'}`;
            div.innerText = msg;
            container.appendChild(div);
            setTimeout(() => { div.classList.remove('translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => {
                div.classList.add('opacity-0');
                setTimeout(() => div.remove(), 300);
            }, 3000);
        }

        function formatPrice(usd) {
            const rub = (usd * 90).toFixed(0);
            const uah = (usd * 40).toFixed(0);
            return { usd, rub, uah };
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.className = currentTheme;
            localStorage.setItem('byrmalda_theme', currentTheme);
            renderSidebar();
        }

        function toggleLang() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            localStorage.setItem('byrmalda_lang', currentLang);
            renderSidebar();
            location.reload(); // Hard refresh to apply all translations simply
        }

        // --- STREAMING_CHUNK:Core Auth Logic... ---

        async function initAuth() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', user.uid));
                    if (userDoc.exists()) {
                        userProfile = userDoc.data();
                        if (userProfile.isBlocked) {
                            renderBlocked();
                            return;
                        }
                    } else {
                        // Create profile if not exists (happens after manual registration flow)
                        userProfile = { 
                            uid: user.uid, 
                            name: user.displayName || 'User', 
                            email: user.email, 
                            avatar: null, 
                            regDate: new Date().toLocaleDateString(),
                            isBlocked: false,
                            id: Math.floor(Math.random() * 1000000).toString()
                        };
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', user.uid), userProfile);
                    }
                    renderSidebar();
                    renderHome();
                    listenSupport();
                } else {
                    currentUser = null;
                    userProfile = null;
                    renderSidebar();
                    renderHome();
                }
            });
        }

        function renderBlocked() {
            document.getElementById('app').innerHTML = `
                <div class="fixed inset-0 bg-white dark:bg-slate-900 z-[100] flex items-center justify-center p-8 text-center">
                    <div class="max-w-md">
                        <h1 class="text-3xl font-bold text-red-500 mb-4">${t('blockedMsg')}</h1>
                    </div>
                </div>
            `;
        }

        // --- STREAMING_CHUNK:Page Rendering... ---

        function renderSidebar() {
            const nav = document.getElementById('nav-links');
            const footer = document.getElementById('user-nav-footer');
            const isAdmin = currentUser?.email === ADMIN_EMAIL;

            const items = [
                { id: 'home', icon: '🏠', label: t('home'), action: renderHome },
                { id: 'search', icon: '🔍', label: t('search'), action: renderSearch },
                { id: 'catalog', icon: '📁', label: t('catalog'), action: renderCatalog },
                { id: 'feedback', icon: '⭐', label: t('feedback'), action: renderReviews },
            ];

            if (currentUser) {
                items.push({ id: 'profile', icon: '👤', label: t('profile'), action: renderProfile });
                items.push({ id: 'cart', icon: '🛒', label: t('cart'), action: renderCart });
                items.push({ id: 'support', icon: '💬', label: t('support'), action: renderSupport, badge: messagesUnreadCount });
                items.push({ id: 'settings', icon: '⚙️', label: t('settings'), action: renderSettings });
                
                if (isAdmin) {
                    items.push({ id: 'admin', icon: '🛠️', label: t('adminPanel'), action: renderAdminPanel });
                } else {
                    items.push({ id: 'suggest', icon: '💡', label: t('suggestProduct'), action: renderSuggestProduct });
                }
            }

            nav.innerHTML = items.map(item => `
                <button onclick="window.navTo('${item.id}')" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group">
                    <span class="text-xl group-hover:scale-110 transition-transform">${item.icon}</span>
                    <span class="hidden lg:inline font-medium">${item.label}</span>
                    ${item.badge ? `<span class="ml-auto bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">${item.badge}</span>` : ''}
                </button>
            `).join('');

            footer.innerHTML = currentUser ? `
                <div class="flex items-center gap-3 px-4 py-2">
                    <img src="${userProfile?.avatar || 'https://placehold.co/100x100/EEE/999?text=' + userProfile?.name[0]}" class="w-10 h-10 rounded-full object-cover">
                    <div class="hidden lg:block overflow-hidden">
                        <p class="font-bold truncate">${userProfile?.name}</p>
                        <button onclick="window.authLogout()" class="text-xs text-red-500 hover:underline">${t('logout')}</button>
                    </div>
                </div>
            ` : `
                <button onclick="window.showLogin()" class="w-full btn-primary bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-3 rounded-xl font-bold">${t('login')}</button>
            `;

            window.navTo = (id) => {
                const item = items.find(i => i.id === id);
                if (item) item.action();
            };
        }

        function renderHome() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="max-w-4xl mx-auto py-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-20">
                        <div class="space-y-6">
                            <h2 class="text-5xl font-black italic tracking-tighter">BYRMALDA</h2>
                            <p class="text-xl text-slate-500 italic">"Одежда — это то, как вы представляете себя миру, особенно сегодня, когда человеческие контакты столь мимолетны. Мода — это мгновенный язык."</p>
                            <p class="text-xl text-slate-500 italic">"Ваша обувь — это фундамент вашего стиля. Мы строим империю с самого низа."</p>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <img src="https://placehold.co/400x600/111/FFF?text=Show+1" class="rounded-2xl hover:scale-105 transition-transform">
                            <img src="https://placehold.co/400x600/333/FFF?text=Show+2" class="rounded-2xl mt-4 hover:scale-105 transition-transform">
                        </div>
                    </div>
                </div>
            `;
        }

        // --- STREAMING_CHUNK:Modals & Auth Logic Implementation... ---

        window.showLogin = () => {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-6">${t('login')}</h2>
                <div class="space-y-4">
                    <input type="email" id="login-email" placeholder="${t('email')}" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-700 dark:border-none focus:ring-2 ring-slate-900 outline-none">
                    <input type="password" id="login-pass" placeholder="${t('password')}" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-700 dark:border-none focus:ring-2 ring-slate-900 outline-none">
                    <p id="login-error" class="text-red-500 text-sm hidden"></p>
                    <button onclick="window.doLogin()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">${t('login')}</button>
                    <button onclick="window.showRegister()" class="w-full text-blue-500 text-sm hover:underline">${t('noAccount')}</button>
                </div>
                <button onclick="window.closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-900">✕</button>
            `;
            document.getElementById('modal-container').classList.remove('hidden');
        };

        window.showRegister = () => {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-6">${t('register')}</h2>
                <div id="reg-step-1" class="space-y-4">
                    <input type="email" id="reg-email" placeholder="${t('email')}" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-700 dark:border-none outline-none">
                    <button onclick="window.doRegisterStep1()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">${t('next')}</button>
                </div>
                <div id="reg-step-2" class="space-y-4 hidden text-center">
                    <div class="text-green-500 text-4xl mb-4">✓</div>
                    <p class="mb-4">${t('checkEmail')}</p>
                    <button onclick="window.showRegisterFinish()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">${t('next')}</button>
                </div>
                <button onclick="window.closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-900">✕</button>
            `;
        };

        window.doRegisterStep1 = async () => {
            const email = document.getElementById('reg-email').value;
            // Simplified: in a real app we'd verify email here. 
            // We'll proceed to password setup for this demo flow.
            document.getElementById('reg-step-1').classList.add('hidden');
            document.getElementById('reg-step-2').classList.remove('hidden');
        };

        window.showRegisterFinish = () => {
            const content = document.getElementById('modal-content');
            const email = document.getElementById('reg-email').value;
            content.innerHTML = `
                <h2 class="text-2xl font-bold mb-6">${t('register')}</h2>
                <div class="space-y-4">
                    <input type="text" id="reg-name" placeholder="${t('name')}" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-700 dark:border-none outline-none">
                    <input type="password" id="reg-pass" placeholder="${t('password')}" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-700 dark:border-none outline-none">
                    <input type="password" id="reg-confirm" placeholder="${t('confirmPassword')}" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-700 dark:border-none outline-none">
                    <button onclick="window.doRegisterFinal('${email}')" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">${t('submit')}</button>
                </div>
            `;
        };

        window.doRegisterFinal = async (email) => {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (pass !== confirm) { showNotify("Passwords do not match", "error"); return; }

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(cred.user, { displayName: name });
                const newUser = { 
                    uid: cred.user.uid, 
                    name, 
                    email, 
                    avatar: null, 
                    regDate: new Date().toLocaleDateString(),
                    isBlocked: false,
                    id: Math.floor(Math.random() * 1000000).toString()
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', cred.user.uid), newUser);
                userProfile = newUser;
                window.closeModal();
                showNotify(t('welcome'));
                renderHome();
            } catch (err) {
                showNotify(err.message, "error");
            }
        };

        window.doLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.closeModal();
            } catch (err) {
                document.getElementById('login-error').innerText = t('accountNotFound');
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        window.authLogout = () => { signOut(auth); location.reload(); };
        window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');

        // --- STREAMING_CHUNK:Support Chat Logic... ---

        let supportListener = null;
        function listenSupport() {
            if (!currentUser) return;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), orderBy('timestamp', 'asc'));
            supportListener = onSnapshot(q, (snapshot) => {
                let unread = 0;
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const msg = change.doc.data();
                        // For user: new message from admin
                        if (!isAdmin() && msg.toId === userProfile.id && !msg.read) unread++;
                        // For admin: new message from any user
                        if (isAdmin() && msg.toId === 'admin' && !msg.read) unread++;
                    }
                });
                messagesUnreadCount = unread;
                renderSidebar();
            });
        }

        function isAdmin() { return currentUser?.email === ADMIN_EMAIL; }

        async function renderSupport() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="max-w-2xl mx-auto h-[calc(100vh-100px)] flex flex-col">
                    <div class="border-b pb-4 mb-4 flex justify-between items-center">
                        <h2 class="text-2xl font-bold">${t('support')}</h2>
                        <span class="text-xs text-slate-400">ID: ${userProfile.id}</span>
                    </div>
                    <div id="chat-window" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scroll mb-4"></div>
                    <div class="flex gap-2">
                        <input type="text" id="chat-input" placeholder="Type..." class="flex-1 p-4 rounded-xl bg-slate-100 dark:bg-slate-800 outline-none">
                        <button onclick="window.sendMessage()" class="bg-slate-900 text-white px-6 rounded-xl font-bold">></button>
                    </div>
                </div>
            `;

            const chatWindow = document.getElementById('chat-window');
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), orderBy('timestamp', 'asc'));
            
            onSnapshot(q, (snapshot) => {
                const messages = [];
                snapshot.forEach(doc => {
                    const m = doc.data();
                    // Filter: User sees messages with admin. Admin sees everything.
                    if (isAdmin() || m.fromId === userProfile.id || m.toId === userProfile.id) {
                        messages.push(m);
                    }
                });
                
                chatWindow.innerHTML = messages.map(m => {
                    const isMine = m.fromId === userProfile.id || (isAdmin() && m.fromId === 'admin');
                    return `

                        text = match[2];
                        fromId = 'admin';
                        fromName = 'Support';

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {

                const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.id));

        async function checkOrderAutoStatus() {
            if (!currentUser) return;
            const ordersSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'orders'));
            const now = new Date().getTime();
            
            ordersSnap.forEach(async docSnap => {
                const o = docSnap.data();
                if (o.adminChanged) return; // Skip if admin touched it

                if (o.status === 'Created') {
                    const days = (now - o.created) / (1000 * 60 * 60 * 24);
                    if (days >= 1) { // 1-4 days range, simplified to 1
                        await updateDoc(docSnap.ref, { status: 'Delivering to delivery' });
                    }
                } else if (o.status === 'Delivering to delivery') {
                    const hours = (now - o.lastUpdated) / (1000 * 60 * 60);
                    if (hours >= 12) {
                        await updateDoc(docSnap.ref, { status: 'In Transit' });
                    }
                }
            });
        }

                    <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border">
                        <div class="flex justify-between mb-2">
                            <span class="font-bold uppercase">${r.userName}</span>
                            <span class="text-yellow-500">${'★'.repeat(r.stars)}</span>
                        </div>
                        <p class="text-slate-500">${r.text}</p>
                    </div>
                `;
            });
        }

        window.showLeaveReview = () => {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 class="text-xl font-bold mb-4">Leave Review</h2>
                <div class="flex gap-2 mb-4" id="star-picker">
                    ${[1,2,3,4,5].map(s => `<button onclick="window.setStars(${s})" class="star-btn text-2xl" data-val="${s}">☆</button>`).join('')}
                </div>
                <textarea id="rev-text" class="w-full p-4 bg-slate-100 rounded-xl mb-4" placeholder="Text..."></textarea>
                <button onclick="window.submitReview()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Send</button>
            `;
            document.getElementById('modal-container').classList.remove('hidden');
            window.selectedStars = 5;
        };
        window.setStars = (s) => {
            window.selectedStars = s;
            document.querySelectorAll('.star-btn').forEach(btn => {
                btn.innerText = parseInt(btn.dataset.val) <= s ? '★' : '☆';
            });
        };
        window.submitReview = async () => {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'feedback'), {
                userId: currentUser.uid, userName: userProfile.name, stars: window.selectedStars, text: document.getElementById('rev-text').value, approved: false
            });
            window.closeModal();
            showNotify("Review sent for moderation!");
        };

        // --- Search ---
        function renderSearch() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="max-w-2xl mx-auto mb-10">
                    <input type="text" id="search-bar" oninput="window.doSearch(this.value)" placeholder="Search sneakers, t-shirts..." class="w-full p-5 bg-white dark:bg-slate-800 rounded-2xl border-none shadow-xl outline-none text-xl">
                </div>
                <div id="search-results" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
            `;
        }
        window.doSearch = async (val) => {
            if (val.length < 2) return;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'products'));
            const snap = await getDocs(q);
            const res = document.getElementById('search-results');
            res.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                if (p.name.toLowerCase().includes(val.toLowerCase()) || p.type.toLowerCase().includes(val.toLowerCase())) {
                    res.innerHTML += renderProductCard(d.id, p);
                }
            });
        };

    </script>
</body>
</html>
