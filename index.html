<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYRMALDA — Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dark { background-color: #0a0a0a; color: #ffffff; }
        .light { background-color: #ffffff; color: #000000; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .balenciaga-btn { border: 1px solid currentColor; transition: all 0.3s; }
        .balenciaga-btn:hover { background-color: currentColor; color: white; }
        .dark .balenciaga-btn:hover { color: black; }
        .modal-blur { backdrop-filter: blur(8px); background: rgba(0,0,0,0.4); }
        .status-badge { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .img-zoom:hover img { transform: scale(1.1); transition: transform 0.5s ease; }
    </style>
</head>
<body class="light overflow-x-hidden" id="mainBody">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, onSnapshot, addDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0YkXZgk8gh01Y7XH3ZRVU5lCjGJ_IRCw",
            authDomain: "frwerwerwr.firebaseapp.com",
            projectId: "frwerwerwr",
            storageBucket: "frwerwerwr.firebasestorage.app",
            messagingSenderId: "969880048160",
            appId: "1:969880048160:web:9001a95f7ea28e98912245",
            measurementId: "G-HCQEFD2SJF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const IMGBB_API_KEY = "eeef3479094c5cf6bf42607927565065";
        const ADMIN_EMAIL = "sobakastalina123@gmail.com";
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'byrmalda-brand-app';

        window.state = {
            user: null,
            isAdmin: false,
            currentPage: 'home',
            theme: 'light',
            language: 'ru',
            cart: [],
            catalog: [],
            notifications: 0,
            isBlocked: false
        };

        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('image', file);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            return data.data.url;
        }

        const translations = {
            ru: {
                login: "Войти", register: "Зарегистрироваться", logout: "Выйти", 
                search: "Поиск", catalog: "Каталог", profile: "Профиль", cart: "Корзина",
                support: "Поддержка", settings: "Настройки", reviews: "Отзывы", panel: "Панель",
                no_acc: "Нет аккаунта? Зарегистрируйтесь", buy: "Купить", preorder: "Предзаказ",
                out_of_stock: "Нет в наличии", total: "Итого", weight: "Вес", delivery: "Доставка",
                id: "Айди", reg_date: "Дата регистрации", name: "Имя", status: "Статус"
            },
            en: {
                login: "Login", register: "Register", logout: "Logout",
                search: "Search", catalog: "Catalog", profile: "Profile", cart: "Cart",
                support: "Support", settings: "Settings", reviews: "Reviews", panel: "Admin",
                no_acc: "No account? Register now", buy: "Buy Now", preorder: "Pre-order",
                out_of_stock: "Out of Stock", total: "Total", weight: "Weight", delivery: "Delivery",
                id: "ID", reg_date: "Reg Date", name: "Name", status: "Status"
            }
        };

        function t(key) {
            return translations[window.state.language][key] || key;
        }

        const UI = {
            init() {
                this.renderSidebar();
                this.renderPage();
                this.listenAuth();
            },

            renderSidebar() {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar) return;
                
                const isAdmin = window.state.user?.email === ADMIN_EMAIL;
                
                sidebar.innerHTML = `
                    <div class="flex flex-col h-full p-8 border-r border-gray-200 dark:border-zinc-800">
                        <h1 class="text-3xl font-bold tracking-tighter mb-16 cursor-pointer" onclick="UI.navigate('home')">BYRMALDA</h1>
                        <nav class="flex flex-col space-y-6 uppercase text-sm tracking-widest font-light">
                            <button onclick="UI.navigate('search')" class="text-left hover:opacity-50 flex items-center gap-2"><i class="fa fa-search"></i> ${t('search')}</button>
                            <button onclick="UI.navigate('catalog')" class="text-left hover:opacity-50 flex items-center gap-2"><i class="fa fa-list"></i> ${t('catalog')}</button>
                            <button onclick="UI.navigate('profile')" class="text-left hover:opacity-50 flex items-center gap-2"><i class="fa fa-user"></i> ${t('profile')}</button>
                            <button onclick="UI.navigate('cart')" class="text-left hover:opacity-50 flex items-center gap-2">
                                <i class="fa fa-shopping-bag"></i> ${t('cart')} 
                                <span class="text-[10px] bg-red-600 text-white px-1 rounded-full ${window.state.cart.length ? '' : 'hidden'}">${window.state.cart.length}</span>
                            </button>
                            <button onclick="UI.navigate('support')" class="text-left hover:opacity-50 flex items-center gap-2 relative">
                                <i class="fa fa-comment"></i> ${t('support')}
                                <span id="supportBadge" class="absolute -top-1 -right-4 w-4 h-4 bg-red-600 text-[10px] text-white flex items-center justify-center rounded-full hidden">0</span>
                            </button>
                            <button onclick="UI.navigate('reviews')" class="text-left hover:opacity-50 flex items-center gap-2"><i class="fa fa-star"></i> ${t('reviews')}</button>
                            <button onclick="UI.navigate('settings')" class="text-left hover:opacity-50 flex items-center gap-2"><i class="fa fa-cog"></i> ${t('settings')}</button>
                            ${!isAdmin && window.state.user ? `<button onclick="UI.navigate('propose')" class="text-left text-xs opacity-70 hover:opacity-100 border-t pt-4 mt-4">Предложить товар</button>` : ''}
                            ${isAdmin ? `<button onclick="UI.navigate('admin')" class="text-left text-red-600 font-bold border-t pt-4 mt-4"><i class="fa fa-shield-halved"></i> ${t('panel')}</button>` : ''}
                        </nav>
                        <div class="mt-auto">
                            ${window.state.user ? 
                                `<button onclick="UI.logout()" class="text-xs opacity-50 hover:opacity-100">${t('logout')}</button>` : 
                                `<button onclick="UI.showAuthModal()" class="balenciaga-btn px-6 py-2 uppercase text-xs">${t('login')}</button>`
                            }
                        </div>
                    </div>
                `;
            },

            async renderPage() {
                const container = document.getElementById('content-area');
                const page = window.state.currentPage;
                
                if (window.state.isBlocked) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-screen text-center p-10 bg-red-950 text-white">
                            <h2 class="text-4xl font-bold mb-4">АККАУНТ ЗАБЛОКИРОВАН</h2>
                            <p class="mb-6 opacity-80">Ваш аккаунт заблокирован из-за нарушений правил сайта.</p>
                            <p>Пожалуйста, напишите нам в Telegram: <a href="https://t.me/fueum" class="underline">@fueum</a></p>
                        </div>
                    `;
                    return;
                }

                switch(page) {
                    case 'home': this.pageHome(container); break;
                    case 'profile': this.pageProfile(container); break;
                    case 'catalog': this.pageCatalog(container); break;
                    case 'search': this.pageSearch(container); break;
                    case 'cart': this.pageCart(container); break;
                    case 'support': this.pageSupport(container); break;
                    case 'settings': this.pageSettings(container); break;
                    case 'reviews': this.pageReviews(container); break;
                    case 'admin': this.pageAdmin(container); break;
                    case 'propose': this.pagePropose(container); break;
                    case 'product': this.pageProduct(container, window.state.selectedProductId); break;
                }
            },

            pageHome(el) {
                const quotes = [
                    "BYRMALDA: EXISTENCE IS DESIGN.",
                    "STRICT LINES FOR CHAOTIC MINDS.",
                    "WE DON'T SELL CLOTHES, WE SELL VOID.",
                    "ANONYMITY IS THE NEW LUXURY."
                ];
                const photos = [
                    "https://placehold.co/800x1200/000/fff?text=BYRMALDA+SHOW+1",
                    "https://placehold.co/800x1200/222/fff?text=BYRMALDA+SHOW+2"
                ];

                el.innerHTML = `
                    <div class="h-screen overflow-y-auto snap-y snap-mandatory hide-scroll">
                        ${photos.map((img, i) => `
                            <div class="h-screen snap-start relative flex items-center justify-center">
                                <img src="${img}" class="absolute inset-0 w-full h-full object-cover grayscale opacity-80" />
                                <div class="relative z-10 text-center px-4">
                                    <h2 class="text-white text-5xl md:text-8xl font-black tracking-tighter mix-blend-difference italic uppercase">
                                        ${quotes[i % quotes.length]}
                                    </h2>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            },

            showAuthModal(isRegister = false) {
                const modal = document.createElement('div');
                modal.className = "fixed inset-0 z-[100] modal-blur flex items-center justify-center p-4";
                modal.id = "authModal";
                modal.innerHTML = `
                    <div class="bg-white dark:bg-zinc-900 p-10 w-full max-w-md shadow-2xl">
                        <div class="flex justify-between items-center mb-10">
                            <h2 class="text-2xl font-bold uppercase tracking-tighter">${isRegister ? 'Registration' : 'Login'}</h2>
                            <button onclick="document.getElementById('authModal').remove()" class="text-2xl">&times;</button>
                        </div>
                        <form id="authForm" class="flex flex-col space-y-6">
                            <input type="email" id="authEmail" placeholder="EMAIL" class="bg-transparent border-b border-gray-300 dark:border-zinc-700 py-3 outline-none uppercase text-xs tracking-widest" required>
                            ${isRegister ? `<input type="text" id="authName" placeholder="YOUR NAME" class="bg-transparent border-b border-gray-300 dark:border-zinc-700 py-3 outline-none uppercase text-xs tracking-widest" required>` : ''}
                            <input type="password" id="authPass" placeholder="PASSWORD" class="bg-transparent border-b border-gray-300 dark:border-zinc-700 py-3 outline-none uppercase text-xs tracking-widest" required>
                            ${isRegister ? `<input type="password" id="authPassConfirm" placeholder="CONFIRM PASSWORD" class="bg-transparent border-b border-gray-300 dark:border-zinc-700 py-3 outline-none uppercase text-xs tracking-widest" required>` : ''}
                            <div id="authError" class="text-red-500 text-[10px] hidden"></div>
                            <button type="submit" class="bg-black text-white dark:bg-white dark:text-black py-4 font-bold uppercase text-xs tracking-widest">
                                ${isRegister ? 'Create Account' : 'Enter'}
                            </button>
                        </form>
                        <div class="mt-8 text-center">
                            <button onclick="document.getElementById('authModal').remove(); UI.showAuthModal(${!isRegister})" class="text-blue-600 text-xs uppercase tracking-widest">
                                ${isRegister ? 'Already have an account? Login' : t('no_acc')}
                            </button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);

                document.getElementById('authForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('authEmail').value;
                    const pass = document.getElementById('authPass').value;
                    const errEl = document.getElementById('authError');
                    errEl.classList.add('hidden');

                    try {
                        if (isRegister) {
                            const name = document.getElementById('authName').value;
                            const pass2 = document.getElementById('authPassConfirm').value;
                            if (pass !== pass2) throw new Error("Passwords do not match");
                            
                            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                            await sendEmailVerification(userCred.user);
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userCred.user.uid), {
                                name: name,
                                email: email,
                                createdAt: new Date().toISOString(),
                                role: 'user',
                                avatar: null,
                                isBlocked: false
                            });
                            alert("Verification email sent! Please check your inbox.");
                            modal.remove();
                        } else {
                            await signInWithEmailAndPassword(auth, email, pass);
                            modal.remove();
                        }
                    } catch (err) {
                        errEl.innerText = err.message === "Firebase: Error (auth/user-not-found)." ? "Account not found" : err.message;
                        errEl.classList.remove('hidden');
                    }
                };
            },

            async pageProfile(el) {
                if (!window.state.user) { el.innerHTML = `<div class="p-20 text-center uppercase tracking-widest">Please Login First</div>`; return; }
                
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', window.state.user.uid));
                const userData = userDoc.data();
                
                // Real-time listener for orders
                const ordersQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), where('userId', '==', window.state.user.uid));
                
                el.innerHTML = `
                    <div class="p-10 max-w-4xl mx-auto">
                        <div class="flex items-center gap-8 mb-16 border-b border-gray-100 dark:border-zinc-800 pb-10">
                            <div class="relative group">
                                <div class="w-32 h-32 rounded-full overflow-hidden bg-gray-100 dark:bg-zinc-800 border">
                                    <img src="${userData?.avatar || 'https://placehold.co/400x400/000/fff?text=BYRMALDA'}" id="profileAvatar" class="w-full h-full object-cover">
                                </div>
                                <div onclick="document.getElementById('avatarInput').click()" class="absolute inset-0 bg-black/50 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 cursor-pointer rounded-full transition-all">
                                    <i class="fa fa-camera"></i>
                                </div>
                                <input type="file" id="avatarInput" class="hidden" accept="image/*" onchange="UI.handleAvatarChange(this)">
                            </div>
                            <div>
                                <h2 class="text-4xl font-bold tracking-tighter uppercase flex items-center gap-2">
                                    ${userData?.name} ${userData?.hasBadge ? '<i class="fa fa-check-circle text-blue-500 text-sm"></i>' : ''}
                                </h2>
                                <p class="text-[10px] opacity-50 uppercase tracking-widest mt-2">${t('id')}: ${window.state.user.uid}</p>
                                <p class="text-[10px] opacity-50 uppercase tracking-widest">${t('reg_date')}: ${new Date(userData?.createdAt).toLocaleDateString()}</p>
                                <p class="text-[10px] opacity-80 uppercase tracking-widest mt-4">${userData?.email}</p>
                            </div>
                        </div>

                        <h3 class="text-xl font-bold uppercase tracking-widest mb-8">Recent Orders</h3>
                        <div id="ordersList" class="flex flex-col gap-4">
                            <p class="opacity-30 italic">Loading orders...</p>
                        </div>
                    </div>
                `;

                onSnapshot(ordersQ, (snap) => {
                    const listEl = document.getElementById('ordersList');
                    if (!listEl) return;
                    if (snap.empty) {
                        listEl.innerHTML = `<div class="p-10 border border-dashed text-center opacity-40 uppercase text-xs">No orders yet</div>`;
                        return;
                    }
                    listEl.innerHTML = snap.docs.map(doc => {
                        const order = doc.data();
                        const canCancel = order.status === 'ожидает оплату' || order.status === 'создан';
                        return `
                            <div class="flex items-center gap-4 border p-4 group hover:bg-gray-50 dark:hover:bg-zinc-900 transition-all cursor-pointer" onclick="UI.navigate('product', '${order.items[0].id}')">
                                <img src="${order.items[0].image}" class="w-20 h-20 object-cover grayscale group-hover:grayscale-0">
                                <div class="flex-1">
                                    <h4 class="font-bold uppercase text-sm">${order.items[0].name}</h4>
                                    <p class="text-[10px] opacity-60">TRACK: ${order.trackingNumber || 'PENDING'}</p>
                                    <div class="flex items-center gap-2 mt-2">
                                        <span class="status-badge px-2 py-0.5 bg-zinc-200 dark:bg-zinc-800 rounded">${order.status}</span>
                                        <span class="text-[10px] opacity-40">${new Date(order.createdAt).toLocaleDateString()}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold">$${order.totalPrice}</p>
                                    ${canCancel ? `<button onclick="event.stopPropagation(); UI.cancelOrder('${doc.id}')" class="text-red-500 hover:text-red-700 text-xl">&times;</button>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                });
            },

            async pageCatalog(el) {
                el.innerHTML = `<div class="p-10"><h2 class="text-4xl font-bold tracking-tighter uppercase mb-12">${t('catalog')}</h2><div id="catalogGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div></div>`;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'products'));
                onSnapshot(q, (snap) => {
                    const grid = document.getElementById('catalogGrid');
                    if (!grid) return;
                    const categories = [...new Set(snap.docs.map(d => d.data().type))];
                    grid.innerHTML = categories.map(cat => {
                        const firstItem = snap.docs.find(d => d.data().type === cat).data();
                        return `
                            <div onclick="UI.showCategory('${cat}')" class="aspect-square relative group cursor-pointer overflow-hidden border">
                                <img src="${firstItem.images[0]}" class="absolute inset-0 w-full h-full object-cover grayscale transition-transform group-hover:scale-105">
                                <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                                    <h3 class="text-white font-bold text-xl uppercase tracking-tighter">${cat}s</h3>
                                </div>
                            </div>
                        `;
                    }).join('');
                });
            },

            showCategory(type) {
                window.state.selectedCategory = type;
                const container = document.getElementById('content-area');
                container.innerHTML = `
                    <div class="p-10">
                        <button onclick="UI.navigate('catalog')" class="mb-8 opacity-50 hover:opacity-100 uppercase text-xs">← Back to catalog</button>
                        <h2 class="text-4xl font-bold tracking-tighter uppercase mb-12">${type}S</h2>
                        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
                    </div>
                `;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'products'), where('type', '==', type));
                onSnapshot(q, (snap) => {
                    document.getElementById('productGrid').innerHTML = snap.docs.map(d => {
                        const p = d.data();
                        const isOut = (p.stock || 0) <= 0;
                        return `
                            <div onclick="UI.navigate('product', '${d.id}')" class="group cursor-pointer">
                                <div class="aspect-[3/4] overflow-hidden bg-gray-100 mb-4 border border-transparent group-hover:border-black dark:group-hover:border-white transition-all">
                                    <img src="${p.images[0]}" class="w-full h-full object-cover grayscale group-hover:grayscale-0">
                                </div>
                                <h4 class="uppercase font-bold text-xs tracking-widest">${p.name}</h4>
                                <div class="flex justify-between items-center mt-2">
                                    ${isOut ? `<span class="text-red-500 text-[10px] font-bold uppercase">${t('out_of_stock')}</span>` : `<span class="text-[11px] font-light">$${p.price}</span>`}
                                </div>
                            </div>
                        `;
                    }).join('');
                });
            },

            async pageProduct(el, id) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'products', id);
                const p = (await getDoc(docRef)).data();
                if (!p) return;

                const rub = (p.price * 95).toFixed(0);
                const uah = (p.price * 38).toFixed(0);
                const isOut = (p.stock || 0) <= 0;

                el.innerHTML = `
                    <div class="flex flex-col md:flex-row h-screen">
                        <div class="w-full md:w-2/3 h-2/3 md:h-full overflow-y-auto snap-y snap-mandatory hide-scroll border-r dark:border-zinc-800">
                            ${p.images.map(img => `<img src="${img}" class="w-full h-screen object-cover snap-start grayscale hover:grayscale-0 transition-all">`).join('')}
                        </div>
                        <div class="w-full md:w-1/3 p-10 flex flex-col justify-center overflow-y-auto">
                            <h2 class="text-4xl font-bold tracking-tighter uppercase mb-4">${p.name}</h2>
                            <p class="text-xs uppercase opacity-60 tracking-widest mb-10">${p.type} / ${p.gender} / ${p.color}</p>
                            
                            <div class="space-y-4 mb-10 text-[11px] uppercase tracking-widest border-t border-b py-8 dark:border-zinc-800">
                                <div class="flex justify-between"><span>Material</span><span>${p.material}</span></div>
                                <div class="flex justify-between"><span>Weight</span><span>${p.weight}g</span></div>
                                <div class="flex justify-between"><span>Collab</span><span>${p.collab || 'None'}</span></div>
                                <div class="flex justify-between"><span>Year</span><span>${p.year}</span></div>
                                <div class="flex justify-between"><span>In Stock</span><span class="${isOut ? 'text-red-600' : ''}">${isOut ? t('out_of_stock') : p.stock + ' units'}</span></div>
                            </div>

                            <div class="mb-10">
                                <p class="text-sm font-light opacity-80 mb-6 leading-relaxed">${p.description}</p>
                            </div>

                            <div class="mt-auto space-y-6">
                                ${isOut ? `
                                    <div class="text-red-600 font-bold uppercase tracking-widest text-2xl">${t('out_of_stock')}</div>
                                    <button onclick="UI.addToCart('${id}', true)" class="w-full bg-zinc-200 dark:bg-zinc-800 py-5 uppercase font-bold text-xs tracking-widest hover:bg-black hover:text-white transition-all">
                                        ${t('preorder')}
                                    </button>
                                ` : `
                                    <div class="flex flex-col gap-1">
                                        <div class="text-3xl font-bold">$${p.price}</div>
                                        <div class="text-[10px] opacity-40">≈ ${rub} RUB / ${uah} UAH</div>
                                    </div>
                                    <div class="flex gap-4">
                                        <select id="selSize" class="bg-transparent border p-4 text-xs uppercase flex-1">
                                            ${p.sizes.map(s => `<option value="${s}">${s}</option>`).join('')}
                                        </select>
                                        <input type="number" id="selQty" value="1" min="1" class="w-20 bg-transparent border p-4 text-xs text-center">
                                    </div>
                                    <button onclick="UI.addToCart('${id}')" class="w-full bg-black text-white dark:bg-white dark:text-black py-5 uppercase font-bold text-xs tracking-widest hover:opacity-80 transition-all">
                                        ${t('buy')}
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            },

            addToCart(id, isPreorder = false) {
                if (!window.state.user) { UI.showAuthModal(); return; }
                const size = document.getElementById('selSize')?.value || 'OS';
                const qty = parseInt(document.getElementById('selQty')?.value || 1);
                
                // Simplified cart: adding to state
                getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id)).then(snap => {
                    const p = snap.data();
                    window.state.cart.push({ ...p, id, selectedSize: size, selectedQty: qty, isPreorder });
                    UI.renderSidebar();
                    alert("Added to cart");
                });
            },

            pageCart(el) {
                const items = window.state.cart;
                if (!items.length) {
                    el.innerHTML = `<div class="p-20 text-center uppercase tracking-widest opacity-30">Your bag is empty</div>`;
                    return;
                }

                let subtotal = 0;
                let totalWeight = 0;
                
                const tableRows = items.map((item, idx) => {
                    const lineTotal = item.price * item.selectedQty;
                    subtotal += lineTotal;
                    totalWeight += item.weight * item.selectedQty;
                    return `
                        <tr class="border-b dark:border-zinc-800 text-xs uppercase tracking-widest">
                            <td class="py-6"><img src="${item.images[0]}" class="w-16 h-16 object-cover grayscale"></td>
                            <td class="py-6">${item.name} ${item.isPreorder ? '<span class="text-red-500">(PREORDER)</span>' : ''}</td>
                            <td>${item.selectedSize}</td>
                            <td>${item.selectedQty}</td>
                            <td>$${item.price}</td>
                            <td>$${lineTotal}</td>
                            <td class="text-right">
                                <button onclick="UI.removeFromCart(${idx})" class="text-red-500 hover:scale-125 transition-transform"><i class="fa fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');

                const deliveryFee = Math.ceil(totalWeight / 1000) * 900;
                const deliveryUSD = (deliveryFee / 95).toFixed(2);
                const finalTotal = (subtotal + parseFloat(deliveryUSD)).toFixed(2);

                el.innerHTML = `
                    <div class="p-10 max-w-6xl mx-auto">
                        <h2 class="text-4xl font-bold tracking-tighter uppercase mb-16">Shopping Bag</h2>
                        <table class="w-full text-left">
                            <thead class="border-b border-black dark:border-white text-[10px] uppercase tracking-[0.2em] opacity-40">
                                <tr>
                                    <th class="pb-4">Item</th><th class="pb-4">Name</th><th class="pb-4">Size</th>
                                    <th class="pb-4">Qty</th><th class="pb-4">Price</th><th class="pb-4">Total</th><th class="pb-4"></th>
                                </tr>
                            </thead>
                            <tbody>${tableRows}</tbody>
                        </table>

                        <div class="flex flex-col items-end mt-16 space-y-4 uppercase tracking-widest">
                            <div class="flex justify-between w-64 text-xs"><span>Subtotal:</span><span>$${subtotal.toFixed(2)}</span></div>
                            <div class="flex justify-between w-64 text-xs"><span>Weight:</span><span>${totalWeight}g</span></div>
                            <div class="flex justify-between w-64 text-xs"><span>Delivery (RUB):</span><span>${deliveryFee} RUB</span></div>
                            <div class="flex justify-between w-64 text-xs font-bold border-t pt-4"><span>Grand Total:</span><span>$${finalTotal}</span></div>
                            <button onclick="UI.checkout('${finalTotal}')" class="mt-10 bg-black text-white dark:bg-white dark:text-black px-12 py-5 font-black text-sm uppercase tracking-[0.3em]">
                                Checkout
                            </button>
                        </div>
                    </div>
                `;
            },

            checkout(total) {
                const modal = document.createElement('div');
                modal.className = "fixed inset-0 z-[100] modal-blur flex items-center justify-center p-4";
                modal.innerHTML = `
                    <div class="bg-white dark:bg-zinc-900 p-10 max-w-lg text-center shadow-2xl">
                        <h2 class="text-2xl font-bold mb-6 uppercase tracking-tighter italic">PAYMENT REQUIRED</h2>
                        <p class="text-sm opacity-70 mb-8 leading-relaxed">To complete your purchase of BYRMALDA products, please contact our administrator on Telegram for payment details.</p>
                        <a href="https://t.me/fueum" target="_blank" class="block w-full bg-blue-600 text-white py-4 font-bold rounded mb-4">MESSAGE @FUEUM</a>
                        <button onclick="UI.confirmCheckout('${total}'); this.parentElement.parentElement.remove()" class="text-xs uppercase tracking-widest opacity-50">I sent the payment, finish order</button>
                    </div>
                `;
                document.body.appendChild(modal);
            },

            async confirmCheckout(total) {
                const orderData = {
                    userId: window.state.user.uid,
                    userName: window.state.user.displayName || 'Client',
                    items: window.state.cart,
                    totalPrice: total,
                    status: 'ожидает оплату',
                    createdAt: new Date().toISOString(),
                    trackingNumber: 'BY-' + Math.random().toString(36).substr(2, 9).toUpperCase()
                };
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), orderData);
                window.state.cart = [];
                UI.renderSidebar();
                UI.navigate('profile');
                alert("Order created! Status: Waiting Payment.");
            },

            pageSupport(container) {
                if (!window.state.user) { container.innerHTML = `<div class="p-20 text-center uppercase tracking-widest">Login for support</div>`; return; }
                
                const isAdmin = window.state.user.email === ADMIN_EMAIL;
                container.innerHTML = `
                    <div class="flex flex-col h-screen p-10">
                        <h2 class="text-4xl font-bold tracking-tighter mb-10">SUPPORT_CENTER</h2>
                        <div id="chatBox" class="flex-1 overflow-y-auto mb-6 flex flex-col gap-4 pr-4">
                            <p class="text-center text-[10px] opacity-20 uppercase tracking-[0.5em]">Establishing secure connection...</p>
                        </div>
                        <div class="flex gap-4 border-t pt-6 dark:border-zinc-800">
                            <input type="text" id="msgInput" placeholder="TYPE MESSAGE..." class="flex-1 bg-transparent border-b py-4 uppercase text-xs outline-none">
                            <button onclick="UI.sendMessage()" class="balenciaga-btn px-10 py-4 uppercase text-xs font-bold">Send</button>
                        </div>
                    </div>
                `;

                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), orderBy('createdAt', 'asc'));
                onSnapshot(q, (snap) => {
                    const chat = document.getElementById('chatBox');
                    if (!chat) return;
                    
                    chat.innerHTML = snap.docs.map(d => {
                        const m = d.data();
                        const isMe = m.senderId === window.state.user.uid;
                        const forMe = isAdmin || m.recipientId === window.state.user.uid || (isMe && !isAdmin);
                        
                        if (!forMe && !isAdmin) return ''; // Security filtering

                        return `
                            <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                                <div class="max-w-[70%] p-4 ${isMe ? 'bg-zinc-100 dark:bg-zinc-800' : 'border'} text-xs uppercase tracking-widest relative">
                                    ${m.text}
                                    <div class="text-[8px] opacity-30 mt-2">${new Date(m.createdAt).toLocaleTimeString()} · ID:${m.senderId}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    chat.scrollTop = chat.scrollHeight;
                });
            },

            async sendMessage() {
                const input = document.getElementById('msgInput');
                if (!input.value.trim()) return;

                const isAdmin = window.state.user.email === ADMIN_EMAIL;
                let text = input.value;
                let recipientId = 'admin';

                if (isAdmin) {
                    const match = text.match(/^\((\d+)\)/);
                    if (match) {
                        recipientId = match[1];
                        text = text.replace(match[0], '').trim();
                    } else {
                        alert("Format: (USER_ID) message");
                        return;
                    }
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    senderId: window.state.user.uid,
                    recipientId: recipientId,
                    text: text,
                    createdAt: new Date().toISOString()
                });
                input.value = '';
            },

            navigate(page, params = null) {
                window.state.currentPage = page;
                if (page === 'product') window.state.selectedProductId = params;
                this.renderPage();
                this.renderSidebar();
            },

            listenAuth() {
                onAuthStateChanged(auth, async (user) => {
                    window.state.user = user;
                    if (user) {
                        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                        const snap = await getDoc(userRef);
                        if (snap.exists()) {
                            window.state.isBlocked = snap.data().isBlocked || false;
                        }
                    }
                    this.renderSidebar();
                    this.renderPage();
                });
            },

            logout() { signOut(auth).then(() => location.reload()); },

            pageAdmin(el) {
                el.innerHTML = `
                    <div class="p-10">
                        <h2 class="text-6xl font-bold tracking-tighter uppercase mb-16 border-b-4 border-black inline-block">ADMIN_DASHBOARD</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <section class="border p-8">
                                <h3 class="text-xl font-bold uppercase mb-6 underline">Create New Product</h3>
                                <div class="flex flex-col gap-4 uppercase text-[10px]" id="createProductForm">
                                    <input type="text" id="pName" placeholder="Name (e.g. T-Shirt Free Drun)" class="border-b py-2 bg-transparent outline-none">
                                    <input type="text" id="pType" placeholder="Category (e.g. Футболка, Кроссовки)" class="border-b py-2 bg-transparent outline-none">
                                    <input type="number" id="pPrice" placeholder="Price in USD" class="border-b py-2 bg-transparent outline-none">
                                    <input type="number" id="pWeight" placeholder="Weight in Grams" class="border-b py-2 bg-transparent outline-none">
                                    <input type="number" id="pStock" placeholder="Quantity" class="border-b py-2 bg-transparent outline-none">
                                    <textarea id="pDesc" placeholder="Description" class="border py-2 bg-transparent outline-none min-h-[100px]"></textarea>
                                    <input type="file" id="pFiles" multiple class="text-[8px]">
                                    <button onclick="UI.adminCreateProduct()" class="bg-black text-white py-4 mt-4 font-bold tracking-widest">PUBLISH</button>
                                </div>
                            </section>
                            <section class="border p-8">
                                <h3 class="text-xl font-bold uppercase mb-6 underline">User Management</h3>
                                <div class="flex gap-2 mb-8">
                                    <input type="text" id="banUserId" placeholder="USER ID" class="border-b flex-1 bg-transparent outline-none text-[10px]">
                                    <button onclick="UI.adminToggleBlock(true)" class="bg-red-600 text-white px-4 text-[10px] py-2">BLOCK</button>
                                    <button onclick="UI.adminToggleBlock(false)" class="bg-green-600 text-white px-4 text-[10px] py-2">UNBLOCK</button>
                                </div>
                                <h3 class="text-xl font-bold uppercase mb-6 underline">Avatar Moderation</h3>
                                <div id="avatarModList" class="space-y-4"></div>
                            </section>
                        </div>
                    </div>
                `;
            },

            async adminCreateProduct() {
                const btn = event.target;
                btn.disabled = true;
                btn.innerText = "UPLOADING...";
                
                const files = document.getElementById('pFiles').files;
                const imageUrls = [];
                for(let f of files) {
                    imageUrls.push(await uploadImage(f));
                }

                const pData = {
                    name: document.getElementById('pName').value,
                    type: document.getElementById('pType').value,
                    price: parseFloat(document.getElementById('pPrice').value),
                    weight: parseInt(document.getElementById('pWeight').value),
                    stock: parseInt(document.getElementById('pStock').value),
                    description: document.getElementById('pDesc').value,
                    images: imageUrls,
                    sizes: ['S', 'M', 'L', 'XL'],
                    gender: 'Unisex',
                    color: 'Black',
                    year: new Date().getFullYear(),
                    createdAt: new Date().toISOString()
                };

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), pData);
                alert("Product Created!");
                this.pageAdmin(document.getElementById('content-area'));
            },

            async adminToggleBlock(isBlock) {
                const uid = document.getElementById('banUserId').value;
                if(!uid) return;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid), { isBlocked: isBlock });
                alert(isBlock ? "Blocked" : "Unblocked");
            }
        };

        UI.init();
    </script>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 fixed h-screen z-50 transition-transform duration-500"></aside>
        
        <!-- Main Content -->
        <main id="content-area" class="flex-1 ml-72 min-h-screen relative"></main>
    </div>

</body>
</html>
