<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LookUp | Professional Music Platform</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        :root { --accent: #1db954; --bg: #050505; --card: #121212; --text: #fff; --sub: #888; }
        .theme-purple { --accent: #a333ff; }
        .theme-red { --accent: #ff3333; }
        .theme-blue { --accent: #3385ff; }
        .theme-green { --accent: #1db954; }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Сетка */
        .sidebar { width: 280px; background: #000; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .main { flex: 1; overflow-y: auto; padding: 40px; padding-bottom: 150px; position: relative; }

        /* Элементы меню */
        .nav-btn { padding: 12px 15px; cursor: pointer; border-radius: 8px; color: var(--sub); font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-btn:hover, .nav-btn.active { background: #1a1a1a; color: #fff; }
        .admin-btn { border: 1px solid var(--accent); color: var(--accent); margin-top: auto; display: none; }

        /* Профиль */
        .profile-hero { display: flex; gap: 30px; background: linear-gradient(180deg, #222, var(--card)); padding: 40px; border-radius: 20px; align-items: flex-end; }
        .p-avatar { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent); cursor: pointer; }
        .p-info h1 { font-size: 48px; margin: 0; }
        .p-info p { color: var(--accent); font-weight: bold; margin: 5px 0; }

        /* Список треков */
        .track-item { display: flex; align-items: center; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; position: relative; }
        .track-item:hover { background: #1a1a1a; }
        .track-item img { width: 45px; height: 45px; border-radius: 4px; margin-right: 15px; }
        .track-item .dots { margin-left: auto; color: var(--sub); font-size: 20px; padding: 5px; }

        /* Плеер */
        .player { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 30px; box-sizing: border-box; z-index: 1000; }
        .p-controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-group { display: flex; align-items: center; gap: 20px; font-size: 28px; }
        .p-slider-box { width: 100%; max-width: 600px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }

        /* Текст песен */
        .lyrics-box { position: fixed; inset: 0 0 100px 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 900; overflow-y: auto; padding: 100px 20px; }
        .lyric-line { font-size: 32px; font-weight: 800; color: #333; margin: 15px 0; transition: 0.4s; text-align: center; }
        .lyric-line.active { color: var(--accent); transform: scale(1.1); filter: drop-shadow(0 0 15px var(--accent)); }

        /* Модалки и формы */
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; margin-top: 20px; border: 1px solid #222; }
        input, textarea, select { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-act { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body id="app-body">

    <div class="sidebar">
        <h2 style="color: var(--accent); margin-bottom: 20px;">LookUp Premium</h2>
        <div class="nav-btn active" onclick="showV('home')">🏠 Главная</div>
        <div class="nav-btn" onclick="showV('profile')">👤 Мой Профиль</div>
        <div class="nav-btn" onclick="showV('playlists')">📚 Плейлисты</div>
        <div class="nav-btn" onclick="showV('upload')">📤 Опубликовать</div>
        <div class="nav-btn" onclick="showV('settings')">⚙️ Настройки</div>
        <div class="nav-btn admin-btn" id="adm-tab" onclick="showV('admin')">🛡️ МОДЕРАЦИЯ</div>
    </div>

    <div class="main">
        <div id="home" class="view active">
            <h1>Мировые релизы</h1>
            <div id="feed"></div>
        </div>

        <div id="profile" class="view">
            <div class="profile-hero">
                <img id="u-ava" src="https://via.placeholder.com/180" class="p-avatar" onclick="changeAva()">
                <div class="p-info">
                    <input type="text" id="u-name" placeholder="Имя" onblur="saveUser()">
                    <p id="u-nick">@nickname</p>
                    <input type="text" id="u-city" placeholder="Город" style="font-size: 16px; color: var(--sub);" onblur="saveUser()">
                    <textarea id="u-bio" placeholder="О себе..." style="background:none; border:none; color:var(--sub); width:100%;" onblur="saveUser()"></textarea>
                    <div style="margin-top:10px;"><b>1,240</b> Подписчиков • <b>340</b> Подписок</div>
                </div>
            </div>
            <h3>Мои треки</h3>
            <div id="user-tracks-list"></div>
        </div>

        <div id="settings" class="view">
            <h2>Настройки</h2>
            <div class="card">
                <label>Тема оформления</label>
                <div style="display:flex; gap:10px; margin: 15px 0;">
                    <div onclick="setT('theme-green')" style="width:40px;height:40px;background:#1db954;border-radius:50%;cursor:pointer;"></div>
                    <div onclick="setT('theme-purple')" style="width:40px;height:40px;background:#a333ff;border-radius:50%;cursor:pointer;"></div>
                    <div onclick="setT('theme-red')" style="width:40px;height:40px;background:#ff3333;border-radius:50%;cursor:pointer;"></div>
                    <div onclick="setT('theme-blue')" style="width:40px;height:40px;background:#3385ff;border-radius:50%;cursor:pointer;"></div>
                </div>
                
                <label>Переводчик</label>
                <select id="lang-toggle">
                    <option value="ru">🇷🇺 Русский (Вкл)</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="off">Выключить</option>
                </select>

                <button class="btn-act" style="background:#ff3333; margin-top:20px;" onclick="alert('Подписка будет активна до конца месяца')">Отключить Premium</button>
                <button class="btn-act" style="background:#444; color:#fff; margin-top:10px;" onclick="showV('report')">Сообщить об ошибке</button>
            </div>
        </div>

        <div id="admin" class="view">
            <h2>Очередь модерации</h2>
            <div id="mod-container">Здесь будут треки на проверку...</div>
        </div>

        <div id="report" class="view">
            <h2>Сообщить об ошибке</h2>
            <div class="card">
                <textarea id="err-desc" placeholder="Опишите проблему..."></textarea>
                <button class="btn-act" onclick="upErrImg()">Прикрепить скриншот</button>
                <button class="btn-act" style="margin-top:10px; width:100%" onclick="sendReport()">Отправить жалобу</button>
            </div>
        </div>
    </div>

    <div id="lyrics-layer" class="lyrics-box" onclick="toggleL()">
        <div id="lyrics-content"></div>
    </div>

    <div class="player">
        <div style="width:30%; display:flex; align-items:center; gap:15px;">
            <img id="p-img" src="https://via.placeholder.com/60" style="border-radius:5px">
            <div><b id="p-name">Тишина</b><br><small id="p-artist" style="color:var(--sub)">LookUp</small></div>
        </div>
        <div class="p-controls">
            <div class="btn-group">
                <span onclick="prev()">⏮</span>
                <span id="play-btn" onclick="togglePlay()">▶️</span>
                <span onclick="next()">⏭</span>
            </div>
            <div class="p-slider-box">
                <span id="cur-time">0:00</span>
                <input type="range" id="progress" value="0">
                <span id="dur-time">0:00</span>
            </div>
        </div>
        <div style="width:30%; text-align:right">
            <span style="font-size:24px; cursor:pointer;" onclick="toggleL()">🎤</span>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const firebaseConfig = {
            apiKey: "AIzaSyDESE8nQzP2iF0YKVexxqRJ6kWoLjDmHw8",
            authDomain: "exzzy1-84d88.firebaseapp.com",
            projectId: "exzzy1-84d88",
            storageBucket: "exzzy1-84d88.firebasestorage.app",
            messagingSenderId: "892085705947",
            appId: "1:892085705947:web:9c9425a0f5d096abdbc0fe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let audio = new Audio();
        let isPlaying = false;
        let activeLyrics = [];

        // 1. ПЛЕЕР С БЕЗБАЖНОЙ ПОЛОСКОЙ
        function play(url, name, artist, img, lyrics) {
            audio.pause();
            audio.src = url;
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = img;
            
            // Сброс полоски и времени
            document.getElementById('progress').value = 0;
            document.getElementById('cur-time').innerText = "0:00";
            
            activeLyrics = lyrics || [];
            renderLyrics();
            
            audio.play();
            isPlaying = true;
            document.getElementById('play-btn').innerText = "⏸";
        }

        audio.ontimeupdate = () => {
            const slider = document.getElementById('progress');
            slider.value = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('cur-time').innerText = formatT(audio.currentTime);
            document.getElementById('dur-time').innerText = formatT(audio.duration || 0);
            syncLyrics(audio.currentTime);
        };

        function togglePlay() {
            if(isPlaying) { audio.pause(); document.getElementById('play-btn').innerText = "▶️"; }
            else { audio.play(); document.getElementById('play-btn').innerText = "⏸"; }
            isPlaying = !isPlaying;
        }

        // 2. СИНХРОНИЗАЦИЯ ТЕКСТА (КАРАОКЕ)
        function renderLyrics() {
            const cont = document.getElementById('lyrics-content');
            cont.innerHTML = activeLyrics.map(l => `<div class="lyric-line">${l.text}</div>`).join('');
        }

        function syncLyrics(time) {
            const lines = document.querySelectorAll('.lyric-line');
            activeLyrics.forEach((l, i) => {
                if(time >= l.t) {
                    lines.forEach(el => el.classList.remove('active'));
                    lines[i].classList.add('active');
                    // Авто-скролл к активной строке
                    lines[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }

        // 3. ПРОФИЛЬ И БАЗА
        async function saveUser() {
            const user = auth.currentUser;
            if(!user) return;
            const data = {
                name: document.getElementById('u-name').value,
                city: document.getElementById('u-city').value,
                bio: document.getElementById('u-bio').value
            };
            await db.collection("users").doc(user.uid).set(data, {merge: true});
        }

        // 4. ТЕМЫ И ПЕРЕКЛЮЧЕНИЯ
        function setT(theme) { document.getElementById('app-body').className = theme; }
        function showV(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'lyrics-layer') toggleL();
        }
        function toggleL() {
            const l = document.getElementById('lyrics-layer');
            l.style.display = (l.style.display === 'flex') ? 'none' : 'flex';
        }

        function formatT(s) {
            let m = Math.floor(s/60);
            let sc = Math.floor(s%60);
            return `${m}:${sc < 10 ? '0' : ''}${sc}`;
        }
        
        // Модерация (Проверка на админа)
        auth.onAuthStateChanged(user => {
            if(user && user.email === "ТВОЙ_EMAIL") {
                document.getElementById('adm-tab').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
